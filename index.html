<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="theme-color" content="#c98f5c" />
  <meta name="description" content="카피바라와 함께하는 4살 덧셈 놀이 PWA" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./assets/icon-192.png" />
  <title>카피바라 덧셈 놀이</title>

  <style>
    :root {
      --bg: #fff8f1;
      --card: #ffffff;
      --primary: #c98f5c;
      --primary-dark: #a97040;
      --secondary: #8fd3c1;
      --accent: #ffd66b;
      --success: #2e9e44;
      --error: #d95c5c;
      --text: #3b3128;
      --muted: #7d6f64;
      --shadow: 0 10px 24px rgba(80, 50, 20, 0.08);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(180deg, #fff8f1 0%, #fff2de 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px;
    }

    .app {
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 3px solid #f5e5d5;
    }

    .hero {
      background: linear-gradient(135deg, #f6d8b8, #f8ebd8);
      padding: 20px 18px 18px;
      text-align: center;
      position: relative;
    }

    .hero img {
      width: 92px;
      height: 92px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 6px 0 6px;
      font-size: 31px;
      color: var(--primary-dark);
    }

    .subtitle {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    .install-tip {
      margin-top: 14px;
      background: rgba(255,255,255,0.72);
      border: 2px dashed #e6c8ab;
      border-radius: 18px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .content {
      padding: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    select, button, input {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 18px;
    }

    select {
      background: #f7f3ef;
      color: var(--text);
    }

    button {
      background: var(--secondary);
      color: #16463d;
      font-weight: 800;
      cursor: pointer;
    }

    button.primary {
      background: var(--primary);
      color: white;
    }

    button:active {
      transform: translateY(1px);
    }

    .board {
      background: #fffaf5;
      border: 2px solid #f4e4d6;
      border-radius: 24px;
      padding: 22px 16px;
      text-align: center;
    }

    .theme-line {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .visual {
      min-height: 72px;
      font-size: 34px;
      line-height: 1.8;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .equation {
      font-size: 38px;
      font-weight: 800;
      margin-bottom: 18px;
      color: #4b3b2d;
    }

    .answer-area {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      max-width: 140px;
      text-align: center;
      font-size: 28px;
      border: 2px solid #ecd8c6;
      background: white;
    }

    .message {
      min-height: 38px;
      margin-top: 16px;
      font-size: 26px;
      font-weight: 800;
    }

    .message.ok {
      color: var(--success);
    }

    .message.no {
      color: var(--error);
    }

    .stars {
      min-height: 32px;
      margin-top: 6px;
      font-size: 26px;
      color: #f2b705;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      background: #f8f4ef;
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      border: 1px solid #f0dfcf;
    }

    .stat .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat .value {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-dark);
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 16px 12px 24px;
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 27px;
      }

      .visual {
        font-size: 28px;
      }

      .equation {
        font-size: 31px;
      }

      .message {
        font-size: 22px;
      }

      input {
        max-width: 110px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <div class="hero">
        <img src="./assets/capybara-badge.svg" alt="카피바라 배지" />
        <h1>🦫 카피바라 덧셈 놀이</h1>
        <div class="subtitle">
          카피바라 친구랑 함께 보고, 세고, 더해봐요!
        </div>
        <div class="install-tip" id="installTip">
          GitHub Pages에 올린 뒤 휴대폰에서 열고, 홈 화면에 추가하면 앱처럼 쓸 수 있어요.
        </div>
      </div>

      <div class="content">
        <div class="controls">
          <select id="mode">
            <option value="visual">카피바라 그림으로 보기</option>
            <option value="number">숫자로 보기</option>
          </select>

          <select id="difficulty">
            <option value="easy">쉬움 (합 0~5 중심)</option>
            <option value="normal">보통 (합 0~10)</option>
          </select>

          <button class="primary" id="checkBtn">정답 확인</button>
          <button id="nextBtn">다음 문제</button>

          <button id="resetBtn">기록 초기화</button>
          <button id="installBtn" style="display:none;">홈 화면에 추가</button>
        </div>

        <div class="board">
          <div class="theme-line">🌿 카피바라 간식 세기 🌿</div>
          <div id="visual" class="visual"></div>
          <div id="equation" class="equation"></div>

          <div class="answer-area">
            <input
              id="answerInput"
              type="number"
              min="0"
              inputmode="numeric"
              placeholder="답"
            />
          </div>

          <div id="message" class="message"></div>
          <div id="stars" class="stars"></div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="label">푼 문제</div>
            <div class="value" id="totalCount">0</div>
          </div>
          <div class="stat">
            <div class="label">맞은 문제</div>
            <div class="value" id="correctCount">0</div>
          </div>
          <div class="stat">
            <div class="label">연속 성공</div>
            <div class="value" id="streakCount">0</div>
          </div>
        </div>
      </div>

      <div class="footer">
        카피바라는 천천히 쉬면서 먹는 동물이에요. 우리도 천천히 해봐요 😊
      </div>
    </div>
  </div>

  <script>
    let a = 0;
    let b = 0;
    let answer = 0;
    let checked = false;
    let deferredPrompt = null;

    const modeEl = document.getElementById('mode');
    const difficultyEl = document.getElementById('difficulty');
    const visualEl = document.getElementById('visual');
    const equationEl = document.getElementById('equation');
    const answerInputEl = document.getElementById('answerInput');
    const messageEl = document.getElementById('message');
    const starsEl = document.getElementById('stars');
    const totalCountEl = document.getElementById('totalCount');
    const correctCountEl = document.getElementById('correctCount');
    const streakCountEl = document.getElementById('streakCount');
    const installBtn = document.getElementById('installBtn');
    const installTip = document.getElementById('installTip');

    const STORAGE_KEY = 'capybara_addition_pwa_stats_v1';

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function loadStats() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return { total: 0, correct: 0, streak: 0 };
      try {
        return JSON.parse(saved);
      } catch {
        return { total: 0, correct: 0, streak: 0 };
      }
    }

    function saveStats(stats) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
      renderStats();
    }

    function renderStats() {
      const stats = loadStats();
      totalCountEl.textContent = stats.total;
      correctCountEl.textContent = stats.correct;
      streakCountEl.textContent = stats.streak;
    }

    function makeCapybaras(n) {
      if (n === 0) return '0';
      return '🦫'.repeat(n);
    }

    function generateProblem() {
      const difficulty = difficultyEl.value;

      if (difficulty === 'easy') {
        a = randomInt(0, 5);
        b = randomInt(0, 5 - a);
      } else {
        a = randomInt(0, 5);
        b = randomInt(0, 5);
        while (a + b > 10) {
          a = randomInt(0, 5);
          b = randomInt(0, 5);
        }
      }

      answer = a + b;
      checked = false;
      renderProblem();
      answerInputEl.value = '';
      messageEl.textContent = '';
      messageEl.className = 'message';
      starsEl.textContent = '';
      answerInputEl.focus();
    }

    function renderProblem() {
      const mode = modeEl.value;

      if (mode === 'visual') {
        visualEl.textContent = `${makeCapybaras(a)} + ${makeCapybaras(b)}`;
        equationEl.textContent = `모두 몇 마리일까?`;
      } else {
        visualEl.textContent = '';
        equationEl.textContent = `${a} + ${b} = ?`;
      }
    }

    function checkAnswer() {
      if (checked) return;

      const raw = answerInputEl.value;
      if (raw === '') {
        messageEl.textContent = '답을 써볼까?';
        messageEl.className = 'message no';
        starsEl.textContent = '';
        return;
      }

      const userAnswer = Number(raw);
      const stats = loadStats();
      stats.total += 1;

      if (userAnswer === answer) {
        stats.correct += 1;
        stats.streak += 1;
        messageEl.textContent = '참 잘했어요! 카피바라가 기뻐해요! 🎉';
        messageEl.className = 'message ok';
        starsEl.textContent = '⭐ ⭐ ⭐';
      } else {
        stats.streak = 0;
        messageEl.textContent = `다시 해보자! 정답은 ${answer}`;
        messageEl.className = 'message no';
        starsEl.textContent = '🌿';
      }

      saveStats(stats);
      checked = true;
    }

    function resetStats() {
      localStorage.removeItem(STORAGE_KEY);
      renderStats();
      messageEl.textContent = '기록을 지웠어요.';
      messageEl.className = 'message';
      starsEl.textContent = '';
    }

    document.getElementById('checkBtn').addEventListener('click', checkAnswer);
    document.getElementById('nextBtn').addEventListener('click', generateProblem);
    document.getElementById('resetBtn').addEventListener('click', resetStats);

    modeEl.addEventListener('change', renderProblem);
    difficultyEl.addEventListener('change', generateProblem);

    answerInputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkAnswer();
    });

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
      installTip.textContent = '홈 화면에 추가 버튼을 누르면 앱처럼 쓸 수 있어요.';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
      installTip.textContent = '홈 화면에 추가되었어요. 이제 앱처럼 사용할 수 있어요!';
      installBtn.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('SW registered'))
          .catch((err) => console.log('SW failed', err));
      });
    }

    renderStats();
    generateProblem();
  </script>
</body>
</html>
